<!DOCTYPE html>
<html>
<head>
  <title>欢迎来到www.homura.fun~</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url(https://haojiezhe12345.top:82/madohomu/bg/mainbg1.jpg);
      background-size: cover;
      filter: blur(0px);
      transition: filter 0.5s ease;
      z-index: -1;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
    }

    h1 {
      font-size: 36px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }
	
	.time {
      font-size: 24px;
      text-align: center;
      margin-top: 20px;
	  color: #fff;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #fff;
      color: #333;
      font-size: 18px;
      text-decoration: none;
      border-radius: 4px;
	  cursor: default;
    }
	
	.webpage-by-wei {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #fff;
      font-size: 12px;
    }

    .scene {
     position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
	  white-space: nowrap;
    }

    .scene.active {
      opacity: 1;
      visibility: visible;
    }
	 .toggle-switch {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
    }

    .toggle-switch input[type="checkbox"] {
      display: none;
    }

    .toggle-switch label {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
      background-color: #ccc;
      border-radius: 10px;
      cursor: pointer;
    }

    .toggle-switch label:before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background-color: #fff;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .toggle-switch input[type="checkbox"]:checked + label {
      background-color: #008000; /* 开启状态的背景颜色 */
    }

    .toggle-switch input[type="checkbox"]:checked + label:before {
      transform: translateX(20px); /* 开启状态下的位置 */
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="toggle-switch"> <!-- 新增开关按钮 -->
    <input type="checkbox" id="switch" onchange="switchScene()"> <!-- 新增开关按钮的checkbox元素 -->
    <label for="switch"></label> <!-- 新增开关按钮的label元素 -->
  </div>
  <div class="time" id="current-time"></div>
  <div class="content">
    <div class="scene scene1 active">
      <h1>Welcome to My Website</h1>
      <p>Experience the best in class services</p>
      <a href="./webpage/main.html" class="button"  onmouseover="blurBackground(10)" onmouseout="blurBackground(0)">Get Started</a>
    </div>
    <div class="scene scene2">
      <h1>あなたと奇跡、私はどちらも好きです</h1>
      <p>welcome to the scene 2 </p>
      <a href="./webpage/main.html" class="button" onmouseover="blurBackground(10)" onmouseout="blurBackground(0)">Get Started</a>
    </div>
  </div>
  <div class="webpage-by-wei">Webpage By Wei</div>
  <script>
    function updateTime() {
      var currentTime = new Date();
      var hours = currentTime.getHours();
      var minutes = currentTime.getMinutes();
      var seconds = currentTime.getSeconds();

      hours = (hours < 10 ? "0" : "") + hours;
      minutes = (minutes < 10 ? "0" : "") + minutes;
      seconds = (seconds < 10 ? "0" : "") + seconds;

      var timeString = "Current Time : " + hours + ":" + minutes + ":" + seconds;
      document.getElementById("current-time").textContent = timeString;
    }

    setInterval(updateTime, 1000); // 每隔一秒更新时间

    function switchScene() { // 修改switchScene函数
      var scene1 = document.querySelector('.scene1');
      var scene2 = document.querySelector('.scene2');
      var background = document.querySelector('.background');
      var switchButton = document.getElementById('switch');

      scene1.classList.toggle('active');
      scene2.classList.toggle('active');
      background.style.backgroundImage = 'url(' + (switchButton.checked ? 'https://haojiezhe12345.top:82/madohomu/bg/mainbg3.jpg' : 'https://haojiezhe12345.top:82/madohomu/bg/mainbg2.jpg') + ')'; // 根据开关状态切换背景图片

      // 修改场景可见性
      if (scene1.classList.contains('active')) {
        scene1.style.opacity = 1;
        scene1.style.visibility = 'visible';
        scene2.style.opacity = 0;
        scene2.style.visibility = 'hidden';
      } else {
        scene1.style.opacity = 0;
        scene1.style.visibility = 'hidden';
        scene2.style.opacity = 1;
        scene2.style.visibility = 'visible';
      }
    }
	
  </script>

  <script>
    function blurBackground(blurValue) {
      var background = document.querySelector('.background');
      background.style.filter = 'blur(' + blurValue + 'px)';
    }
  </script>
</body>
</html>
