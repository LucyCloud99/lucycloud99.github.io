<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ACGN-LearnWebPage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            color: #333333;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #333333;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 40px;
            text-align: center;
        }

        .feature {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }

        .feature img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin-right: 20px;
        }

        .feature h3 {
            font-size: 24px;
            margin: 0;
        }

        .cta-button {
            background-color: #333333;
            color: #ffffff;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .cta-button:hover {
            background-color: #666666;
        }

        .footer {
            background-color: #333333;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>ケキ、ケキ、丸いケキ</h1>
    </header>
	<p><a href="https://www.bilibili.com/bangumi/media/md2539">网站开发中，欢迎观看魔法少女小圆</a>
	<audio id="audio-player" src="video1.mp3" controls autoplay></audio>
	<script>
    // 获取音频元素
    var audioPlayer = document.getElementById("audio-player");

    // 播放按钮点击事件
    function playMusic() {
        audioPlayer.play();
    }

    // 暂停按钮点击事件
    function pauseMusic() {
        audioPlayer.pause();
    }

    // 停止按钮点击事件
    function stopMusic() {
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
    }
</script>
    <section class="content">
        <div class="feature">
            <img src="image1.jpg" alt="Feature Image">
            <h3>まどか</h3>
        </div>

        <div class="feature">
            <img src="image2.jpg" alt="Feature Image">
            <h3>ほむら</h3>
        </div>

        <div class="feature">
            <img src="image3.jpg" alt="Feature Image">
            <h3>卓越品质</h3>
        </div>

        <button class="cta-button">了解更多</button>
    </section>

    <footer class="footer">
        <p>&copy; 都快2024年了，快来看马猴烧酒吧</p>
    </footer>
</body>
</html>
