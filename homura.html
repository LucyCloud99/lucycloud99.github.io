<!DOCTYPE html>
<html>
<head>
  <title>优美简洁的页面示例</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .header {
      background-color: #333;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    p {
      margin-bottom: 10px;
    }

    .image-container {
      text-align: center;
      margin-bottom: 20px;
    }

    .image-container img {
      max-width: 100%;
    }

    .button-container {
      text-align: center;
    }

    .button {
      padding: 10px 20px;
      background-color: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>欢迎来到我的网页</h1>
    <p>这是一个优美、简洁且包含多个元素的页面示例</p>
  </header>

  <div class="container">
    <div class="image-container">
      <img src="./picture/aa.jpg" alt="图片">
    </div>

    <p>下面是魔法少女まどか☆マギカ的十周年网站，欢迎了解。</p>

    <div class="button-container">
      <a href="https://10th.madoka-magica.com/" class="button">焔ちゃん可愛い</a>
    </div>
  </div>
</body>
</html>
